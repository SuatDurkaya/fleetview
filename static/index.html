<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetView</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0C16;
    --bg-elevated: #10132316;
    --panel: #12152A;
    --panel-alt: #171B33;
    --panel-border: #262C4A;
    --hairline: #1E2340;

    --text-primary: #F2F3F8;
    --text-secondary: #8B90AE;
    --text-tertiary: #565C7D;

    --primary: #B85CF0;
    --primary-dim: rgba(184, 92, 240, 0.16);
    --cyan: #3FD6DE;
    --cyan-dim: rgba(63, 214, 222, 0.14);

    --signal: #34D399;
    --signal-dim: rgba(52, 211, 153, 0.14);
    --warn: #F0B429;
    --warn-dim: rgba(240, 180, 41, 0.14);
    --danger: #F1587A;
    --danger-dim: rgba(241, 88, 122, 0.14);

    --aws-hue: #F0B429;
    --hetzner-hue: #34D399;
    --do-hue: #3FD6DE;

    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  /* ---------- App shell: sidebar + content ---------- */

  .app-shell {
    display: flex;
    min-height: 100vh;
  }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--hairline);
    padding: 22px 16px;
    display: flex;
    flex-direction: column;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px 26px 8px;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.01em;
  }

  .sidebar-mark {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--primary), var(--cyan));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 12.5px;
    color: #0A0C16;
  }

  .sidebar-nav-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    padding: 0 10px;
    margin-bottom: 8px;
  }

  .sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 9px;
    font-size: 13.5px;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }

  .sidebar-nav-item .provider-badge { width: 7px; height: 7px; }

  .sidebar-nav-item.active {
    background: var(--primary-dim);
    color: var(--text-primary);
    font-weight: 500;
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--hairline);
  }

  .sidebar-account {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
  }

  .sidebar-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), var(--primary));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 13px;
    color: #0A0C16;
  }

  .sidebar-account-name { font-size: 13px; font-weight: 500; }
  .sidebar-account-sub { font-size: 11px; color: var(--text-tertiary); }

  .content {
    flex: 1;
    min-width: 0;
    padding: 34px 40px 48px;
    max-width: 1160px;
  }

  /* ---------- Header ---------- */

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 26px;
  }

  h1 {
    font-family: var(--font-display);
    font-size: 25px;
    font-weight: 600;
    letter-spacing: -0.015em;
  }

  .subtitle {
    color: var(--text-secondary);
    font-size: 13.5px;
    margin-top: 6px;
  }

  #refresh-status {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text-secondary);
    text-align: right;
  }

  #refresh-status .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--signal);
    margin-right: 7px;
    animation: pulse 2.4s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ---------- KPI cards ---------- */

  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 14px;
    margin-bottom: 26px;
  }

  .summary-card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 8px 20px rgba(4, 6, 16, 0.35);
  }

  .summary-card .label {
    font-size: 12.5px;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }

  .summary-card .value {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .summary-card .value.accent {
    background: linear-gradient(135deg, var(--cyan), var(--primary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* ---------- Provider sections ---------- */

  section.provider {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(4, 6, 16, 0.3);
  }

  .provider-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 20px;
    border-bottom: 1px solid var(--hairline);
  }

  .provider-name {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14.5px;
    letter-spacing: -0.01em;
  }

  .provider-badge {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .provider-badge.aws { background: var(--aws-hue); }
  .provider-badge.hetzner { background: var(--hetzner-hue); }
  .provider-badge.digitalocean { background: var(--do-hue); }

  .provider-count {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text-tertiary);
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    text-align: left;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    padding: 11px 20px;
    font-weight: 500;
  }

  td {
    padding: 13px 20px;
    font-size: 13px;
    border-top: 1px solid var(--hairline);
  }

  tbody tr:hover td { background: var(--panel-alt); }

  td.mono { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.02em;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .status-pill.running { background: var(--signal-dim); color: var(--signal); }
  .status-pill.stopped { background: var(--danger-dim); color: var(--danger); }
  .status-pill.idle { background: var(--warn-dim); color: var(--warn); }
  .status-pill.unknown { background: var(--panel-alt); color: var(--text-tertiary); }

  .empty-state {
    padding: 26px 20px;
    color: var(--text-tertiary);
    font-size: 12.5px;
  }

  .error-banner {
    background: var(--danger-dim);
    border: 1px solid rgba(241, 88, 122, 0.3);
    color: var(--danger);
    padding: 13px 18px;
    border-radius: 12px;
    margin-bottom: 22px;
    font-size: 12.5px;
  }

  footer {
    margin-top: 28px;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 11px;
    font-family: var(--font-mono);
  }

  /* ---------- Login ---------- */

  #login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  #login-overlay.hidden { display: none; }

  .login-box {
    width: 100%;
    max-width: 320px;
    padding: 32px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(4, 6, 16, 0.5);
  }

  .login-mark {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), var(--cyan));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 15px;
    color: #0A0C16;
    margin-bottom: 18px;
  }

  .login-box h2 {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 600;
    margin-bottom: 22px;
    color: var(--text-primary);
  }

  .login-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 11px 13px;
    color: var(--text-primary);
    font-size: 13.5px;
    margin-bottom: 12px;
  }

  .login-box input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .login-box button {
    width: 100%;
    background: linear-gradient(135deg, var(--primary), #9548D6);
    color: #FFFFFF;
    border: none;
    border-radius: 10px;
    padding: 11px 12px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13.5px;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  .login-box button:hover { opacity: 0.9; }

  .login-error {
    color: var(--danger);
    font-size: 12px;
    margin-bottom: 12px;
    min-height: 15px;
  }

  #dashboard { display: none; }
  #dashboard.visible { display: flex; }

  @media (max-width: 720px) {
    .sidebar { display: none; }
    .content { padding: 24px 18px; }
  }
</style>


</head>
<body>
  <div id="login-overlay">
    <div class="login-box">
      <div class="login-mark">FV</div>
      <h2>Sign in</h2>
      <div class="login-error" id="login-error"></div>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
      <button id="login-button">Sign in</button>
    </div>
  </div>

  <div class="app-shell" id="dashboard">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-mark">FV</div>
        <span>FleetView</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-nav-label">Providers</div>
        <div class="sidebar-nav-item active"><span class="provider-badge aws"></span>AWS</div>
        <div class="sidebar-nav-item"><span class="provider-badge hetzner"></span>Hetzner</div>
        <div class="sidebar-nav-item"><span class="provider-badge digitalocean"></span>DigitalOcean</div>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-account">
          <div class="sidebar-avatar">S</div>
          <div>
            <div class="sidebar-account-name">Suat</div>
            <div class="sidebar-account-sub">Operator</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="content">
      <header>
        <div>
          <h1>Welcome back 👋</h1>
          <div class="subtitle">AWS · Hetzner · DigitalOcean — in one view</div>
        </div>
        <div id="refresh-status"><span class="dot"></span>connecting…</div>
      </header>

      <div class="error-banner" id="error-banner"></div>

      <div class="summary-row" id="summary-row"></div>

      <div id="providers-container"></div>

      <footer>API_BASE = <span id="api-base-label"></span> · auto-refreshes every 15 seconds</footer>
    </main>
  </div>

<script>
  // Backend'in FastAPI adresi — farklı bir portta/host'ta çalışıyorsa burayı değiştir
  const API_BASE = "http://localhost:8000";
  document.getElementById("api-base-label").textContent = API_BASE;

  const PROVIDER_LABELS = {
    aws: "AWS",
    hetzner: "Hetzner",
    digitalocean: "DigitalOcean",
  };

  function statusClass(status) {
    const s = (status || "").toLowerCase();
    if (["running", "active"].includes(s)) return "running";
    if (["stopped", "off"].includes(s)) return "stopped";
    return "unknown";
  }

  function renderSummary(resources) {
    const byProvider = {};
    for (const r of resources) {
      byProvider[r.provider] = byProvider[r.provider] || { count: 0, cost: 0 };
      byProvider[r.provider].count += 1;
      byProvider[r.provider].cost += r.monthly_cost_usd || 0;
    }

    const totalCost = resources.reduce((sum, r) => sum + (r.monthly_cost_usd || 0), 0);

    const container = document.getElementById("summary-row");
    container.innerHTML = "";

    const totalCard = document.createElement("div");
    totalCard.className = "summary-card";
    totalCard.innerHTML = `
      <div class="label">Total Resources</div>
      <div class="value accent">${resources.length}</div>
    `;
    container.appendChild(totalCard);

    const costCard = document.createElement("div");
    costCard.className = "summary-card";
    costCard.innerHTML = `
      <div class="label">Estimated Monthly Cost</div>
      <div class="value">$${totalCost.toFixed(2)}</div>
    `;
    container.appendChild(costCard);

    for (const [provider, data] of Object.entries(byProvider)) {
      const card = document.createElement("div");
      card.className = "summary-card";
      card.innerHTML = `
        <div class="label">${PROVIDER_LABELS[provider] || provider}</div>
        <div class="value">${data.count}</div>
      `;
      container.appendChild(card);
    }
  }

  function metricsRowHtml(metrics) {
    if (!metrics) return "";

    const fmt = (v) => (v === null || v === undefined ? "—" : `${v}%`);
    const idleBadge = metrics.is_idle
      ? `<span class="status-pill idle" style="margin-left:8px;">IDLE — LOW USAGE</span>`
      : "";

    return `
      <tr>
        <td colspan="6" class="mono" style="background: var(--bg); font-size: 12px;">
          <span style="color: var(--text-secondary);">LIVE —</span>
          CPU ${fmt(metrics.cpu_usage_percent)} ·
          RAM ${fmt(metrics.ram_usage_percent)} ·
          Disk ${fmt(metrics.disk_usage_percent)} ·
          1h avg CPU ${fmt(metrics.cpu_usage_1h_avg_percent)}
          ${idleBadge}
        </td>
      </tr>
    `;
  }

  function renderProviders(resources, metricsByProvider = {}) {
    const grouped = {};
    for (const key of Object.keys(PROVIDER_LABELS)) grouped[key] = [];
    for (const r of resources) {
      if (!grouped[r.provider]) grouped[r.provider] = [];
      grouped[r.provider].push(r);
    }

    const container = document.getElementById("providers-container");
    container.innerHTML = "";

    for (const [provider, items] of Object.entries(grouped)) {
      const section = document.createElement("section");
      section.className = "provider";

      const header = document.createElement("div");
      header.className = "provider-header";
      header.innerHTML = `
        <div class="provider-name">
          <span class="provider-badge ${provider}"></span>
          ${PROVIDER_LABELS[provider] || provider}
        </div>
        <div class="provider-count">${items.length} resources</div>
      `;
      section.appendChild(header);

      if (items.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No resources found for this provider.";
        section.appendChild(empty);
      } else {
        const table = document.createElement("table");
        table.innerHTML = `
          <thead>
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th>Type</th>
              <th>Region</th>
              <th>IP</th>
              <th>Monthly $</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(r => `
              <tr>
                <td>${r.name || "—"}</td>
                <td><span class="status-pill ${statusClass(r.status)}">${r.status || "unknown"}</span></td>
                <td class="mono">${r.server_type || "—"}</td>
                <td class="mono">${r.region || "—"}</td>
                <td class="mono">${r.public_ip || "—"}</td>
                <td class="mono">${r.monthly_cost_usd != null ? r.monthly_cost_usd.toFixed(2) : "—"}</td>
              </tr>
            `).join("")}
            ${metricsRowHtml(metricsByProvider[provider])}
          </tbody>
        `;
        section.appendChild(table);
      }

      container.appendChild(section);
    }
  }

  function showError(message) {
    const banner = document.getElementById("error-banner");
    banner.textContent = message;
    banner.style.display = "block";
  }

  function hideError() {
    document.getElementById("error-banner").style.display = "none";
  }

  // Token, sekme açık olduğu sürece hafızada tutulur (sekme kapanınca/tarayıcı
  // yeniden başlayınca silinir — sessionStorage bunun için kullanılıyor,
  // localStorage kullanmıyoruz çünkü o sonsuza kadar kalıcı olurdu).
  function getToken() {
    return sessionStorage.getItem("fleetview_token");
  }

  function setToken(token) {
    sessionStorage.setItem("fleetview_token", token);
  }

  function clearToken() {
    sessionStorage.removeItem("fleetview_token");
  }

  function showLogin(message) {
    document.getElementById("login-overlay").classList.remove("hidden");
    document.getElementById("dashboard").classList.remove("visible");
    document.getElementById("login-error").textContent = message || "";
  }

  function showDashboard() {
    document.getElementById("login-overlay").classList.add("hidden");
    document.getElementById("dashboard").classList.add("visible");
  }

  async function handleLogin() {
    const password = document.getElementById("login-password").value;
    const errorEl = document.getElementById("login-error");
    errorEl.textContent = "";

    try {
      const response = await fetch(`${API_BASE}/api/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });

      if (!response.ok) {
        errorEl.textContent = "Incorrect password.";
        return;
      }

      const data = await response.json();
      setToken(data.access_token);
      showDashboard();
      loadResources();
    } catch (err) {
      errorEl.textContent = `Connection error: ${err.message}`;
    }
  }

  document.getElementById("login-button").addEventListener("click", handleLogin);
  document.getElementById("login-password").addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleLogin();
  });

  async function fetchLiveMetrics() {
    const token = getToken();
    if (!token) return {};

    try {
      const response = await fetch(`${API_BASE}/api/metrics`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!response.ok) return {};
      const data = await response.json();
      // Metrikler şu an tek bir Hetzner sunucusundan geliyor (Prometheus
      // sadece o sunucuyu izliyor) — bu yüzden "hetzner" sağlayıcısına
      // eşliyoruz. İleride başka sağlayıcılarda da sunucu izlenirse,
      // backend'in /api/metrics'i sağlayıcı bazlı ayırması gerekecek.
      return { hetzner: data };
    } catch (err) {
      return {};
    }
  }

  async function loadResources() {
    const statusEl = document.getElementById("refresh-status");
    const token = getToken();
    if (!token) {
      showLogin();
      return;
    }

    try {
      const response = await fetch(`${API_BASE}/api/resources`, {
        headers: { Authorization: `Bearer ${token}` },
      });

      if (response.status === 401) {
        // Token süresi dolmuş veya geçersiz — tekrar login iste
        clearToken();
        showLogin("Session expired, please sign in again.");
        return;
      }

      if (!response.ok) throw new Error(`API returned ${response.status}`);
      const resources = await response.json();
      const metricsByProvider = await fetchLiveMetrics();

      hideError();
      renderSummary(resources);
      renderProviders(resources, metricsByProvider);
      statusEl.innerHTML = `<span class="dot"></span>connected — last updated ${new Date().toLocaleTimeString("en-US")}`;
    } catch (err) {
      showError(`Could not connect to the API: ${err.message}. Make sure the backend (uvicorn) is running and CORS is enabled.`);
      statusEl.innerHTML = `<span class="dot" style="background:#F0654A"></span>connection error`;
    }
  }

  // Sayfa açılışında: token varsa direkt dashboard'u göster ve veriyi çek,
  // yoksa login ekranını göster.
  if (getToken()) {
    showDashboard();
    loadResources();
  } else {
    showLogin();
  }

  setInterval(() => {
    if (getToken()) loadResources();
  }, 15000);
</script>
</body>
</html>
