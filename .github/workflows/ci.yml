name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: Uygulamanın import edilebildiğini kontrol et
        run: python -c "from app.main import app; print('OK: FastAPI app başarıyla yüklendi')"